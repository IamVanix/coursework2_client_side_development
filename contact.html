<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<h3>Spice Haven</h3>
</div>
</nav>

<div class="container mt-5">
<div class="glass">

<h2 class="text-center">Book a Table</h2>

<form onsubmit="return saveBooking()">

<input type="text" id="name" class="form-control mb-3" placeholder="Name">
<input type="email" id="email" class="form-control mb-3" placeholder="Email">
<input type="number" id="people" class="form-control mb-3" placeholder="People">

<button class="btn btn-success w-100">Book Now</button>

</form>

<p id="message" class="mt-3 text-center"></p>

</div>
</div>

<script src="js/script.js"></script>
</body>
</html>
